name: Deploy Shopverse Frontends To GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'admin-side/**'
      - 'client-side/**'
      - 'pages/index.html'
      - '.github/workflows/client-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install admin dependencies
        working-directory: admin-side
        run: npm install

      - name: Build admin frontend
        working-directory: admin-side
        run: npm run build

      - name: Install client dependencies
        working-directory: client-side
        run: npm install

      - name: Build client frontend
        working-directory: client-side
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Assemble Pages bundle
        run: |
          mkdir -p public/admin public/client
          cp pages/index.html public/index.html
          cp pages/index.html public/404.html
          cp -r admin-side/dist/* public/admin/
          cp -r client-side/dist/* public/client/
          touch public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
