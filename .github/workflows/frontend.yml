name: Frontend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'admin-side/**'
      - 'client-side/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'admin-side/**'
      - 'client-side/**'

jobs:
  lint-admin:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'admin-side/package-lock.json'

    - name: Install dependencies
      run: cd admin-side && npm install

    - name: Lint code
      run: cd admin-side && npm run lint

  lint-client:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'client-side/package-lock.json'

    - name: Install dependencies
      run: cd client-side && npm install

    - name: Lint code
      run: cd client-side && npm run lint

  build:
    needs: [lint-admin, lint-client]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Admin Dashboard
      run: |
        cd admin-side
        npm install
        npm run build

    - name: Build Client Side
      run: |
        cd client-side
        npm install
        npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: builds
        path: |
          admin-side/dist
          client-side/dist

  deploy-frontend:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Admin Dashboard
      run: |
        cd admin-side
        npm install
        npm run build

    - name: Build Client Side
      run: |
        cd client-side
        npm install
        npm run build

    - name: Install gh-pages
      run: npm install --save-dev gh-pages

    - name: Deploy to GitHub Pages
      run: |
        git config user.email "github-actions@github.com"
        git config user.name "GitHub Actions"
        
        cd admin-side
        npm install --save-dev gh-pages
        npm run deploy -- --nojekyll
        
        cd ../client-side
        npm install --save-dev gh-pages
        npm run deploy -- --nojekyll

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create deployment status
      uses: actions/github-script@v6
      if: always()
      with:
        script: |
          const deployment = await github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.ref,
            environment: 'production',
            required_contexts: [],
            auto_merge: false
          });

          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: deployment.data.id,
            state: context.job.status === 'success' ? 'success' : 'failure',
            description: 'Frontend deployment ' + (context.job.status === 'success' ? 'succeeded' : 'failed'),
            environment_url: 'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}'
          });
