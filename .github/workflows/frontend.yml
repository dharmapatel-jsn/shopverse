name: Frontend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'admin-side/**'
      - 'client-side/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'admin-side/**'
      - 'client-side/**'

jobs:
  lint-admin:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'admin-side/package-lock.json'

    - name: Install dependencies
      run: cd admin-side && npm install

    - name: Lint code
      run: cd admin-side && npm run lint

  lint-client:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'client-side/package-lock.json'

    - name: Install dependencies
      run: cd client-side && npm install

    - name: Lint code
      run: cd client-side && npm run lint

  build:
    needs: [lint-admin, lint-client]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Admin Dashboard
      run: |
        cd admin-side
        npm install
        npm run build

    - name: Build Client Side
      run: |
        cd client-side
        npm install
        npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: builds
        path: |
          admin-side/dist
          client-side/dist
