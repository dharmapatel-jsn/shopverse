<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopVerse - Frontend Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --admin-bg: #f4f5f7;
            --admin-sidebar: #000000;
            --accent: #ffc107;
            --accent-deep: #e6ad06;
            --text: #111111;
            --muted: #666666;
        }
        body {
            background:
                radial-gradient(1200px 500px at 8% -10%, rgba(255, 193, 7, 0.28), transparent 60%),
                radial-gradient(900px 400px at 92% 112%, rgba(0, 0, 0, 0.12), transparent 60%),
                var(--admin-bg);
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .landing-card {
            background: #ffffff;
            border: 1px solid #ececec;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.14);
            border-radius: 18px;
            overflow: hidden;
        }
        .title-brand {
            color: var(--text);
            letter-spacing: 0.2px;
            font-weight: 700;
        }
        .subtitle {
            color: var(--muted);
            font-weight: 500;
        }
        .btn-custom {
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            border-width: 1px;
            font-weight: 700;
        }
        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.16);
            text-decoration: none;
        }
        .btn-client {
            background: var(--admin-sidebar);
            color: #ffffff;
            border-color: var(--admin-sidebar);
        }
        .btn-client:hover {
            background: #191919;
            border-color: #191919;
            color: #ffffff;
        }
        .btn-admin {
            background: var(--accent);
            color: #000000;
            border-color: var(--accent);
        }
        .btn-admin:hover {
            background: var(--accent-deep);
            border-color: var(--accent-deep);
            color: #000000;
        }
        .logo-icon {
            font-size: 4rem;
            color: var(--accent);
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="landing-card">
                        <div class="text-center py-5 px-4">
                            <div class="mb-4">
                                <i class="fas fa-bolt logo-icon"></i>
                            </div>
                            <h1 class="display-3 title-brand mb-3">ShopVerse</h1>
                            <p class="lead subtitle mb-5">Choose which frontend you want to open</p>
                            <div class="d-flex justify-content-center gap-4 flex-wrap">
                                <a href="/shopverse/client/" class="btn btn-custom btn-client btn-lg">
                                    <i class="fas fa-store me-2"></i>Visit Store
                                </a>
                                <a href="/shopverse/admin/" class="btn btn-custom btn-admin btn-lg">
                                    <i class="fas fa-user-shield me-2"></i>Admin Panel
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
